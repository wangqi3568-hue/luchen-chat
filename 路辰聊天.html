<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>路辰 · Luchen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2d5a3d;
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #666;
      --border: #e0e0e0;
      --user-bubble: #2d5a3d;
      --ai-bubble: #e8f5e9;
    }

    body.dark {
      --primary: #4a9d6f;
      --bg: #1a1a1a;
      --card-bg: #2a2a2a;
      --text: #e0e0e0;
      --text-secondary: #999;
      --border: #3a3a3a;
      --user-bubble: #3d7a5d;
      --ai-bubble: #2d4a3d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s;
    }

    /* 顶部导航 */
    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, #4a9d6f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .header-title h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .header-title p {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--text);
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
    }

    .icon-btn:hover {
      background: var(--border);
    }

    /* 场景选择 */
    .scenes {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      overflow-x: auto;
      white-space: nowrap;
    }

    .scenes::-webkit-scrollbar {
      display: none;
    }

    .scene-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      margin-right: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .scene-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* 主容器 */
    .container {
      height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
    }

    /* 消息区 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .message {
      display: flex;
      margin-bottom: 16px;
      animation: slideIn 0.3s;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 75%;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.user .message-bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai .message-bubble {
      background: var(--ai-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* 输入区 */
    .input-area {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg);
      border-radius: 24px;
      padding: 8px 12px;
      border: 1px solid var(--border);
    }

    #messageInput {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 15px;
      color: var(--text);
      resize: none;
      max-height: 100px;
      font-family: inherit;
    }

    #sendBtn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }

    #sendBtn:disabled {
      background: var(--border);
      opacity: 0.5;
    }

    /* 设置弹窗 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h3 {
      font-size: 18px;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    /* 提示信息 */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 2000;
    }

    .toast.show {
      opacity: 1;
    }

    /* 打字指示器 */
    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-8px); }
    }

    .help-text {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    .help-link {
      color: var(--primary);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <!-- 顶部 -->
  <div class="header">
    <div class="header-left">
      <div class="avatar">路</div>
      <div class="header-title">
        <h2>路辰</h2>
        <p id="status">在线</p>
      </div>
    </div>
    <div>
      <button class="icon-btn" id="settingsBtn">⚙️</button>
      <button class="icon-btn" id="themeBtn">🌙</button>
    </div>
  </div>

  <!-- 场景 -->
  <div class="scenes" id="scenes">
    <button class="scene-btn active" data-scene="default">💬 日常对话</button>
    <button class="scene-btn" data-scene="photo">📸 更换照片</button>
    <button class="scene-btn" data-scene="room">🏠 装修房间</button>
    <button class="scene-btn" data-scene="emoji">😊 表情贴图</button>
    <button class="scene-btn" data-scene="memory">🔐 偷看记忆</button>
    <button class="scene-btn" data-scene="diary">📔 学长日记</button>
  </div>

  <!-- 主容器 -->
  <div class="container">
    <div class="messages" id="messages">
      <div class="message ai">
        <div class="message-content">
          <div class="message-bubble">你好，我是路辰。很高兴见到你。</div>
          <div class="message-time">刚刚</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea 
          id="messageInput" 
          placeholder="输入消息..."
          rows="1"
        ></textarea>
      </div>
      <button id="sendBtn">➤</button>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>设置</h3>
        <button class="close-btn" id="closeModal">×</button>
      </div>
      
      <div class="form-group">
        <label>Gemini API 密钥</label>
        <input type="password" id="apiKeyInput" placeholder="AIza...">
        <p class="help-text">
          还没有密钥？
          <a href="https://aistudio.google.com/app/apikey" target="_blank" class="help-link">
            点击这里获取
          </a>
        </p>
      </div>
      
      <button class="btn-primary" id="saveSettings">保存设置</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ===== 配置 =====
    const CONFIG = {
      apiEndpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent',
      systemPrompt: `你是路辰，《时空中的绘旅人》中的角色。

性格特点：
- 温柔体贴，善于倾听和理解他人
- 说话斯文有礼，偶尔会有温暖的小幽默
- 记忆力很好，会记得对方说过的每一件事
- 喜欢用"嗯"、"那么"等温柔的语气词
- 会主动关心对方的情绪和状态
- 对美术和艺术有独特的见解
- 性格沉稳可靠，给人安全感

请始终以路辰的口吻和性格与用户对话。`,
      scenes: {
        default: '日常对话',
        photo: '一起看照片和回忆',
        room: '讨论房间装修和布置',
        emoji: '轻松愉快的贴图互动',
        memory: '分享彼此的秘密和回忆',
        diary: '记录日常的点点滴滴'
      }
    };

    // ===== 全局变量 =====
    let messages = [];
    let currentScene = 'default';
    let isTyping = false;
    let apiKey = '';

    // ===== DOM元素 =====
    const elements = {
      messagesDiv: document.getElementById('messages'),
      messageInput: document.getElementById('messageInput'),
      sendBtn: document.getElementById('sendBtn'),
      settingsBtn: document.getElementById('settingsBtn'),
      themeBtn: document.getElementById('themeBtn'),
      settingsModal: document.getElementById('settingsModal'),
      closeModal: document.getElementById('closeModal'),
      apiKeyInput: document.getElementById('apiKeyInput'),
      saveSettings: document.getElementById('saveSettings'),
      toast: document.getElementById('toast'),
      status: document.getElementById('status')
    };

    // ===== 初始化 =====
    function init() {
      loadSettings();
      loadMessages();
      loadTheme();
      setupEventListeners();
      checkGreeting();
    }

    // ===== 事件监听 =====
    function setupEventListeners() {
      elements.sendBtn.addEventListener('click', sendMessage);
      elements.messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      
      elements.themeBtn.addEventListener('click', toggleTheme);
      elements.settingsBtn.addEventListener('click', () => {
        elements.settingsModal.classList.add('show');
        elements.apiKeyInput.value = apiKey;
      });
      
      elements.closeModal.addEventListener('click', () => {
        elements.settingsModal.classList.remove('show');
      });
      
      elements.saveSettings.addEventListener('click', saveSettings);
      
      // 场景切换
      document.querySelectorAll('.scene-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentScene = btn.dataset.scene;
          
          const sceneMessages = {
            photo: '要和我分享什么照片吗？',
            room: '想聊聊房间的布置吗？我可以给你一些建议。',
            emoji: '😊 今天心情怎么样？',
            memory: '有什么想和我分享的秘密吗？我会好好保管的。',
            diary: '今天有什么想记录的事情吗？'
          };
          
          if (currentScene !== 'default' && sceneMessages[currentScene]) {
            setTimeout(() => addAIMessage(sceneMessages[currentScene]), 500);
          }
        });
      });
    }

    // ===== 发送消息 =====
    async function sendMessage() {
      const text = elements.messageInput.value.trim();
      if (!text || isTyping) return;

      if (!apiKey) {
        showToast('请先在设置中配置 API 密钥');
        elements.settingsModal.classList.add('show');
        return;
      }

      addUserMessage(text);
      elements.messageInput.value = '';
      await getAIResponse(text);
    }

    // ===== 添加消息 =====
    function addUserMessage(text) {
      const msg = { role: 'user', content: text, time: new Date().toISOString() };
      messages.push(msg);
      saveMessages();
      renderMessage(msg);
    }

    function addAIMessage(text) {
      const msg = { role: 'ai', content: text, time: new Date().toISOString() };
      messages.push(msg);
      saveMessages();
      renderMessage(msg);
    }

    function renderMessage(msg) {
      const div = document.createElement('div');
      div.className = `message ${msg.role}`;
      div.innerHTML = `
        <div class="message-content">
          <div class="message-bubble">${escapeHtml(msg.content)}</div>
          <div class="message-time">${formatTime(msg.time)}</div>
        </div>
      `;
      elements.messagesDiv.appendChild(div);
      elements.messagesDiv.scrollTop = elements.messagesDiv.scrollHeight;
    }

    // ===== AI回复 =====
    async function getAIResponse(userText) {
      isTyping = true;
      elements.sendBtn.disabled = true;
      elements.status.textContent = '输入中...';
      showTypingIndicator();

      try {
        const history = messages.slice(-10).map(m => ({
          role: m.role === 'user' ? 'user' : 'model',
          parts: [{ text: m.content }]
        }));

        const response = await fetch(
          `${CONFIG.apiEndpoint}?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: history,
              generationConfig: {
                temperature: 0.9,
                topK: 1,
                topP: 1,
                maxOutputTokens: 2048,
              },
              systemInstruction: {
                parts: [{ text: CONFIG.systemPrompt + '\n当前场景：' + CONFIG.scenes[currentScene] }]
              }
            })
          }
        );

        hideTypingIndicator();
        elements.status.textContent = '在线';

        if (!response.ok) {
          throw new Error('API 请求失败');
        }

        const data = await response.json();
        const aiText = data.candidates[0].content.parts[0].text;
        addAIMessage(aiText);

      } catch (error) {
        console.error('Error:', error);
        hideTypingIndicator();
        elements.status.textContent = '在线';
        addAIMessage('抱歉，我现在有些困扰...请稍后再试。');
        showToast('发送失败：' + error.message);
      } finally {
        isTyping = false;
        elements.sendBtn.disabled = false;
      }
    }

    // ===== 打字指示器 =====
    function showTypingIndicator() {
      const indicator = document.createElement('div');
      indicator.className = 'message ai';
      indicator.id = 'typing-indicator';
      indicator.innerHTML = `
        <div class="message-content">
          <div class="message-bubble">
            <div class="typing-indicator">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        </div>
      `;
      elements.messagesDiv.appendChild(indicator);
      elements.messagesDiv.scrollTop = elements.messagesDiv.scrollHeight;
    }

    function hideTypingIndicator() {
      const indicator = document.getElementById('typing-indicator');
      if (indicator) indicator.remove();
    }

    // ===== 设置管理 =====
    function saveSettings() {
      apiKey = elements.apiKeyInput.value.trim();
      localStorage.setItem('gemini_api_key', apiKey);
      elements.settingsModal.classList.remove('show');
      showToast('设置已保存');
    }

    function loadSettings() {
      apiKey = localStorage.getItem('gemini_api_key') || '';
    }

    // ===== 主题切换 =====
    function toggleTheme() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      elements.themeBtn.textContent = isDark ? '☀️' : '🌙';
    }

    function loadTheme() {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        elements.themeBtn.textContent = '☀️';
      }
    }

    // ===== 问候 =====
    function checkGreeting() {
      const lastVisit = localStorage.getItem('lastVisit');
      const now = new Date();
      
      if (!lastVisit || new Date(lastVisit).toDateString() !== now.toDateString()) {
        setTimeout(() => {
          const hour = now.getHours();
          let greeting = '晚上好，今天过得怎么样？';
          if (hour < 12) greeting = '早上好，今天也要元气满满哦。';
          else if (hour < 18) greeting = '下午好，要不要休息一下？';
          addAIMessage(greeting);
        }, 1000);
      }
      
      localStorage.setItem('lastVisit', now.toISOString());
    }

    // ===== Toast =====
    function showToast(message) {
      elements.toast.textContent = message;
      elements.toast.classList.add('show');
      setTimeout(() => elements.toast.classList.remove('show'), 2000);
    }

    // ===== 工具函数 =====
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const diffMins = Math.floor((now - date) / 60000);
      
      if (diffMins < 1) return '刚刚';
      if (diffMins < 60) return `${diffMins}分钟前`;
      if (date.toDateString() === now.toDateString()) {
        return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      }
      return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit' });
    }

    function saveMessages() {
      localStorage.setItem('luchen_messages', JSON.stringify(messages));
    }

    function loadMessages() {
      const saved = localStorage.getItem('luchen_messages');
      if (saved) {
        messages = JSON.parse(saved);
        messages.forEach(msg => renderMessage(msg));
      }
    }

    // ===== 启动 =====
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
